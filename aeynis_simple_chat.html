<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeynis Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 1000px;
            height: 95vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .status {
            padding: 12px 20px;
            background: #d4edda;
            border-bottom: 1px solid #c3e6cb;
            font-size: 13px;
            color: #155724;
            font-weight: 500;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border-bottom-color: #f5c6cb;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-label {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message-content {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #dee2e6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 2px solid #dee2e6;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .controls button {
            flex: 1;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #saveConvo {
            background: #17a2b8;
            color: white;
        }

        #saveConvo:hover {
            background: #138496;
            transform: translateY(-1px);
        }

        #clearChat {
            background: #dc3545;
            color: white;
        }

        #clearChat:hover {
            background: #c82333;
            transform: translateY(-1px);
        }

        .input-container {
            display: flex;
            gap: 12px;
        }

        #messageInput {
            flex: 1;
            padding: 14px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            min-height: 60px;
            transition: border-color 0.2s;
        }

        #messageInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #sendBtn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 100px;
        }

        #sendBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        #sendBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .thinking {
            font-style: italic;
            color: #6c757d;
            padding: 14px 18px;
        }

        .config-info {
            font-size: 12px;
            color: #6c757d;
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            text-align: center;
        }

        .chat-area::-webkit-scrollbar {
            width: 8px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .chat-area::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Library Panel */
        .library-panel {
            display: none;
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 360px;
            background: white;
            border-left: 2px solid #dee2e6;
            box-shadow: -4px 0 20px rgba(0,0,0,0.1);
            z-index: 100;
            flex-direction: column;
            overflow: hidden;
        }

        .library-panel.open {
            display: flex;
        }

        .library-header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .library-header h2 {
            font-size: 18px;
            margin: 0;
        }

        .library-close {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            padding: 0 4px;
        }

        .library-usage {
            padding: 10px 16px;
            background: #e8f5e9;
            font-size: 12px;
            color: #2e7d32;
            border-bottom: 1px solid #c8e6c9;
        }

        .library-usage .usage-bar {
            height: 6px;
            background: #c8e6c9;
            border-radius: 3px;
            margin-top: 6px;
            overflow: hidden;
        }

        .library-usage .usage-fill {
            height: 100%;
            background: #43a047;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .library-tabs {
            display: flex;
            border-bottom: 1px solid #dee2e6;
        }

        .library-tabs button {
            flex: 1;
            padding: 10px;
            border: none;
            background: #f8f9fa;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: #6c757d;
            transition: all 0.2s;
        }

        .library-tabs button.active {
            background: white;
            color: #11998e;
            border-bottom: 2px solid #11998e;
        }

        .library-filelist {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .library-file {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin: 4px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 13px;
            gap: 10px;
        }

        .library-file:hover {
            background: #f0f9f4;
        }

        .library-file .file-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .library-file .file-details {
            flex: 1;
            min-width: 0;
        }

        .library-file .file-name {
            font-weight: 600;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .library-file .file-meta {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }

        .library-empty {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 14px;
        }

        .container {
            position: relative;
        }

        #libraryBtn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        #libraryBtn:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(17, 153, 142, 0.3);
        }

        /* Image Viewer Panel */
        .image-panel {
            display: none;
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 420px;
            background: #1a1a2e;
            border-right: 2px solid #16213e;
            box-shadow: 4px 0 20px rgba(0,0,0,0.3);
            z-index: 100;
            flex-direction: column;
            overflow: hidden;
            color: #e0e0e0;
        }

        .image-panel.open {
            display: flex;
        }

        .image-panel-header {
            background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .image-panel-header h2 {
            font-size: 18px;
            margin: 0;
        }

        .image-panel-close {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            padding: 0 4px;
        }

        .image-nav {
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            align-items: center;
        }

        .image-nav button {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            background: #0f3460;
            color: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .image-nav button:hover {
            background: #e94560;
        }

        .image-nav .image-counter {
            flex: 1;
            text-align: center;
            font-size: 13px;
            color: #a0a0b0;
        }

        .image-display {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .image-display img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }

        .image-folders {
            padding: 12px;
            overflow-y: auto;
            flex: 1;
        }

        .image-folder-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin: 6px 0;
            background: #16213e;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            gap: 12px;
        }

        .image-folder-item:hover {
            background: #0f3460;
        }

        .image-folder-item .folder-icon {
            font-size: 24px;
        }

        .image-folder-item .folder-details {
            flex: 1;
        }

        .image-folder-item .folder-name {
            font-weight: 600;
            color: #e0e0e0;
        }

        .image-folder-item .folder-count {
            font-size: 12px;
            color: #a0a0b0;
            margin-top: 2px;
        }

        .image-perception {
            background: #16213e;
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .image-perception h4 {
            color: #e94560;
            margin: 0 0 6px 0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .image-perception p {
            margin: 0;
            color: #c0c0d0;
        }

        .image-perception .resonance {
            color: #38ef7d;
            font-style: italic;
        }

        .image-perception .exif {
            color: #a0a0b0;
            font-size: 12px;
        }

        .image-empty {
            text-align: center;
            padding: 40px 20px;
            color: #606080;
            font-size: 14px;
        }

        #imageViewerBtn {
            background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
            color: white;
        }

        #imageViewerBtn:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(233, 69, 96, 0.3);
        }

        /* File link in chat messages */
        .file-link {
            display: inline-block;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 13px;
            margin: 4px 2px;
            transition: opacity 0.2s;
        }

        .file-link:hover {
            opacity: 0.85;
        }

        /* Image thumbnail in chat messages */
        .chat-image-thumb {
            max-width: 200px;
            max-height: 150px;
            border-radius: 8px;
            margin: 8px 0 4px 0;
            cursor: pointer;
            transition: opacity 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .chat-image-thumb:hover {
            opacity: 0.85;
        }
        .chat-image-caption {
            font-size: 12px;
            color: #a0a0b0;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌊 Aeynis</h1>
            <p>Bridge Chat • Backend localhost:5555</p>
        </div>

        <div id="status" class="status">
            ✓ Ready
        </div>

        <div class="chat-area" id="chatArea"></div>

        <!-- Image Viewer Panel -->
        <div class="image-panel" id="imagePanel">
            <div class="image-panel-header">
                <h2>Image Viewer</h2>
                <button class="image-panel-close" id="imagePanelClose">&times;</button>
            </div>
            <div class="image-nav" id="imageNav" style="display:none;">
                <button id="imgPrev">&larr; Prev</button>
                <span class="image-counter" id="imageCounter">0/0</span>
                <button id="imgNext">Next &rarr;</button>
                <button id="imgDiscuss" title="Discuss this image in chat" style="background:linear-gradient(135deg,#667eea,#764ba2);">💬 Discuss</button>
                <button id="imgClose" style="background:#e94560;">Close</button>
            </div>
            <div class="image-display" id="imageDisplay">
                <div class="image-folders" id="imageFolders">
                    <div class="image-empty">Loading folders...</div>
                </div>
            </div>
        </div>

        <!-- Library Side Panel -->
        <div class="library-panel" id="libraryPanel">
            <div class="library-header">
                <h2>Aeynis Library</h2>
                <button class="library-close" id="libraryClose">&times;</button>
            </div>
            <div class="library-usage" id="libraryUsage">Loading...</div>
            <div class="library-tabs">
                <button class="active" data-subdir="">All</button>
                <button data-subdir="originals">Originals</button>
                <button data-subdir="reviews">Reviews</button>
                <button data-subdir="imports">Imports</button>
            </div>
            <div class="library-filelist" id="libraryFileList">
                <div class="library-empty">Loading files...</div>
            </div>
        </div>

        <div class="input-area">
            <div class="controls">
                <button id="imageViewerBtn">🖼 Images</button>
                <button id="libraryBtn">📚 Library</button>
                <button id="saveConvo">💾 Save Conversation</button>
                <button id="clearChat">🗑️ Clear Chat</button>
            </div>
            <div class="input-container">
                <textarea 
                    id="messageInput" 
                    placeholder="Type your message... (Enter to send, Shift+Enter for new line)"
                    autofocus
                ></textarea>
                <button id="sendBtn">Send</button>
            </div>
            <div class="config-info">
                Bridge Backend @ localhost:5555 • Basins + Memory + KoboldCpp + Library
            </div>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        let isProcessing = false;

        const statusDiv = document.getElementById('status');
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const saveConvoBtn = document.getElementById('saveConvo');
        const clearChatBtn = document.getElementById('clearChat');

        function setStatus(message, isError = false) {
            statusDiv.textContent = message;
            statusDiv.className = 'status' + (isError ? ' error' : '');
        }

        function addMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = role === 'user' ? 'You' : 'Aeynis';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            msgDiv.appendChild(label);
            msgDiv.appendChild(contentDiv);
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showThinking() {
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message assistant';
            thinkingDiv.id = 'thinking';

            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = 'Aeynis';

            const content = document.createElement('div');
            content.className = 'thinking';
            content.textContent = 'Thinking...';

            thinkingDiv.appendChild(label);
            thinkingDiv.appendChild(content);
            chatArea.appendChild(thinkingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeThinking() {
            const thinking = document.getElementById('thinking');
            if (thinking) thinking.remove();
        }

        function buildPrompt(userMessage) {
            let prompt = '';
            
            // Add conversation history
            conversationHistory.forEach(msg => {
                if (msg.role === 'user') {
                    prompt += `User: ${msg.content}\n`;
                } else {
                    prompt += `Assistant: ${msg.content}\n`;
                }
            });

            // Add current message
            prompt += `User: ${userMessage}\nAssistant:`;
            return prompt;
        }

        async function sendToBackend(userMessage, includeImage = false) {
            const payload = { message: userMessage };
            if (includeImage) payload.include_image = true;

            const response = await fetch('http://localhost:5555/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                throw new Error(`Backend returned status ${response.status}`);
            }

            const data = await response.json();

            // If the backend opened/navigated the image viewer, sync the panel
            if (data.image_viewer && data.image_viewer.is_open) {
                syncViewerPanel(data.image_viewer);
            }

            return data.response;
        }

        // Sync the viewer panel when the chat backend triggers an image view
        function syncViewerPanel(viewerState) {
            // Auto-open the viewer panel if it isn't already
            if (!imageViewerOpen) {
                imagePanel.classList.add('open');
                imageViewerOpen = true;
            }
            // Show nav and load the current image from the viewer API
            imageNav.style.display = 'flex';
            loadCurrentImage();
        }

        async function handleSend() {
            const message = messageInput.value.trim();
            if (!message || isProcessing) return;

            isProcessing = true;
            sendBtn.disabled = true;
            messageInput.disabled = true;

            addMessage('user', message);
            conversationHistory.push({ role: 'user', content: message });
            messageInput.value = '';

            showThinking();
            setStatus('Thinking...');

            try {
                const response = await sendToBackend(message);
                removeThinking();
                addMessage('assistant', response);
                conversationHistory.push({ role: 'assistant', content: response });
                setStatus('✓ Ready');
            } catch (error) {
                removeThinking();
                const errorMsg = `[Error: ${error.message}. Is the backend running on port 5555?]`;
                addMessage('assistant', errorMsg);
                setStatus('❌ Error: ' + error.message, true);
            }

            isProcessing = false;
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }

        sendBtn.addEventListener('click', handleSend);
        
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        saveConvoBtn.addEventListener('click', () => {
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            const content = conversationHistory.map(msg => 
                `${msg.role.toUpperCase()}: ${msg.content}\n`
            ).join('\n');

            const fullContent = `AEYNIS CONVERSATION\nTimestamp: ${new Date().toISOString()}\n\n${content}`;

            const blob = new Blob([fullContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `aeynis_${timestamp}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            
            setStatus('✓ Conversation saved');
            setTimeout(() => setStatus('✓ Ready'), 2000);
        });

        clearChatBtn.addEventListener('click', () => {
            if (confirm('Clear conversation history?')) {
                conversationHistory = [];
                chatArea.innerHTML = '';
                setStatus('✓ Chat cleared');
                setTimeout(() => setStatus('✓ Ready'), 2000);
            }
        });

        messageInput.focus();

        // ---------------------------------------------------------------
        // Library Panel
        // ---------------------------------------------------------------
        const BACKEND = 'http://localhost:5555';
        const libraryPanel = document.getElementById('libraryPanel');
        const libraryBtn = document.getElementById('libraryBtn');
        const libraryClose = document.getElementById('libraryClose');
        const libraryFileList = document.getElementById('libraryFileList');
        const libraryUsage = document.getElementById('libraryUsage');
        let currentLibrarySubdir = '';

        libraryBtn.addEventListener('click', () => {
            libraryPanel.classList.toggle('open');
            if (libraryPanel.classList.contains('open')) {
                loadLibraryFiles(currentLibrarySubdir);
            }
        });

        libraryClose.addEventListener('click', () => {
            libraryPanel.classList.remove('open');
        });

        // Tab switching
        document.querySelectorAll('.library-tabs button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.library-tabs button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLibrarySubdir = btn.dataset.subdir;
                loadLibraryFiles(currentLibrarySubdir);
            });
        });

        async function loadLibraryFiles(subdir) {
            try {
                const res = await fetch(`${BACKEND}/library/files?subdir=${encodeURIComponent(subdir)}`);
                const data = await res.json();

                // Update usage bar
                const u = data.usage;
                libraryUsage.innerHTML = `
                    ${u.used_human} / ${u.limit_human} used (${u.percent_used}%)
                    <div class="usage-bar"><div class="usage-fill" style="width:${Math.min(u.percent_used, 100)}%"></div></div>
                `;

                // Render file list
                if (data.files.length === 0) {
                    libraryFileList.innerHTML = '<div class="library-empty">No files yet. Aeynis can write documents here.</div>';
                    return;
                }

                libraryFileList.innerHTML = data.files.map(f => {
                    const icon = fileIcon(f.type, f.name);
                    if (f.type === 'directory') {
                        return `<div class="library-file" onclick="loadLibraryFiles('${f.path.replace(/\/$/, '')}')">
                            <span class="file-icon">${icon}</span>
                            <div class="file-details">
                                <div class="file-name">${f.name}</div>
                                <div class="file-meta">Directory</div>
                            </div>
                        </div>`;
                    }
                    const viewUrl = `${BACKEND}/library/serve/${encodeURIComponent(f.path)}`;
                    return `<div class="library-file" onclick="window.open('${viewUrl}', '_blank')">
                        <span class="file-icon">${icon}</span>
                        <div class="file-details">
                            <div class="file-name">${f.name}</div>
                            <div class="file-meta">${f.size_human} &middot; ${new Date(f.modified).toLocaleDateString()}</div>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) {
                libraryFileList.innerHTML = `<div class="library-empty">Error loading library: ${err.message}</div>`;
            }
        }

        function fileIcon(mimeType, name) {
            if (name && name.endsWith('/')) return '📁';
            if (!mimeType) return '📄';
            if (mimeType.includes('pdf')) return '📕';
            if (mimeType.includes('html')) return '🌐';
            if (mimeType.includes('markdown') || (name && name.endsWith('.md'))) return '📝';
            if (mimeType.includes('text')) return '📄';
            if (mimeType.includes('opendocument')) return '📘';
            return '📎';
        }

        // Parse file links in assistant messages: [file:path/to/file.md]
        function renderFileLinks(text) {
            return text.replace(/\[file:([^\]]+)\]/g, (match, path) => {
                const url = `${BACKEND}/library/serve/${encodeURIComponent(path.trim())}`;
                const name = path.split('/').pop();
                return `<a href="${url}" target="_blank" class="file-link">📄 ${name}</a>`;
            });
        }

        // Override addMessage to support file links
        const _origAddMessage = addMessage;
        addMessage = function(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = role === 'user' ? 'You' : 'Aeynis';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (role === 'assistant') {
                // Render file links as clickable elements
                contentDiv.innerHTML = renderFileLinks(
                    content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                );
            } else {
                contentDiv.textContent = content;
            }

            msgDiv.appendChild(label);
            msgDiv.appendChild(contentDiv);
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        };

        // ---------------------------------------------------------------
        // Image Viewer Panel
        // ---------------------------------------------------------------
        const imagePanel = document.getElementById('imagePanel');
        const imageViewerBtn = document.getElementById('imageViewerBtn');
        const imagePanelClose = document.getElementById('imagePanelClose');
        const imageDisplay = document.getElementById('imageDisplay');
        const imageFolders = document.getElementById('imageFolders');
        const imageNav = document.getElementById('imageNav');
        const imageCounter = document.getElementById('imageCounter');

        let imageViewerOpen = false;

        imageViewerBtn.addEventListener('click', () => {
            imagePanel.classList.toggle('open');
            imageViewerOpen = imagePanel.classList.contains('open');
            if (imageViewerOpen) {
                loadImageFolders();
            }
        });

        imagePanelClose.addEventListener('click', () => {
            imagePanel.classList.remove('open');
            imageViewerOpen = false;
        });

        document.getElementById('imgPrev').addEventListener('click', async () => {
            await imageNavAction('prev');
        });

        document.getElementById('imgNext').addEventListener('click', async () => {
            await imageNavAction('next');
        });

        document.getElementById('imgClose').addEventListener('click', async () => {
            await fetch(`${BACKEND}/images/close`, { method: 'POST' });
            imageNav.style.display = 'none';
            loadImageFolders();
        });

        // "Discuss" button — sends the current image to chat so Aeynis can talk about it
        document.getElementById('imgDiscuss').addEventListener('click', async () => {
            if (isProcessing) return;
            try {
                const res = await fetch(`${BACKEND}/images/discuss`, { method: 'POST' });
                const data = await res.json();
                if (data.error) {
                    setStatus('No image to discuss', true);
                    return;
                }
                // Show a thumbnail + filename in chat as the "user" message
                const caption = `Let's look at this one: ${data.filename} [${data.position + 1}/${data.total}]`;
                addImageMessage('user', caption, data.serve_url);

                // Send to backend as a chat message so Aeynis responds
                isProcessing = true;
                sendBtn.disabled = true;
                messageInput.disabled = true;
                showThinking();
                setStatus('Aeynis is looking at the photo...');

                const chatMsg = `I'm looking at ${data.filename}. What do you see?`;
                conversationHistory.push({ role: 'user', content: chatMsg });

                const response = await sendToBackend(chatMsg, true);
                removeThinking();
                addMessage('assistant', response);
                conversationHistory.push({ role: 'assistant', content: response });
                setStatus('Ready');
            } catch (err) {
                removeThinking();
                setStatus('Error: ' + err.message, true);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
            }
        });

        // Helper: add a message with an image thumbnail to chat
        function addImageMessage(role, caption, serveUrl) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = role === 'user' ? 'You' : 'Aeynis';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (serveUrl) {
                const img = document.createElement('img');
                img.src = `${BACKEND}${serveUrl}`;
                img.className = 'chat-image-thumb';
                img.alt = caption;
                // Click thumbnail to open/focus viewer panel
                img.addEventListener('click', () => {
                    if (!imageViewerOpen) {
                        imagePanel.classList.add('open');
                        imageViewerOpen = true;
                    }
                });
                contentDiv.appendChild(img);
                contentDiv.appendChild(document.createElement('br'));
            }

            const text = document.createElement('span');
            text.textContent = caption;
            contentDiv.appendChild(text);

            msgDiv.appendChild(label);
            msgDiv.appendChild(contentDiv);
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function loadImageFolders() {
            try {
                const res = await fetch(`${BACKEND}/images/folders`);
                const data = await res.json();
                const folders = data.folders || [];

                if (folders.length === 0) {
                    imageFolders.innerHTML = '<div class="image-empty">No image folders found.<br>Place images in ~/AeynisLibrary/images/</div>';
                    imageDisplay.innerHTML = '';
                    imageDisplay.appendChild(imageFolders);
                    return;
                }

                imageFolders.innerHTML = folders.map(f =>
                    `<div class="image-folder-item" data-path="${f.path}">
                        <span class="folder-icon">📁</span>
                        <div class="folder-details">
                            <div class="folder-name">${f.name}</div>
                            <div class="folder-count">${f.image_count} image${f.image_count !== 1 ? 's' : ''}</div>
                        </div>
                    </div>`
                ).join('');

                // Attach click handlers
                imageFolders.querySelectorAll('.image-folder-item').forEach(el => {
                    el.addEventListener('click', () => openImageFolder(el.dataset.path));
                });

                imageDisplay.innerHTML = '';
                imageDisplay.appendChild(imageFolders);
                imageNav.style.display = 'none';
            } catch (err) {
                imageFolders.innerHTML = `<div class="image-empty">Error: ${err.message}</div>`;
            }
        }

        async function openImageFolder(folderPath) {
            try {
                const res = await fetch(`${BACKEND}/images/open`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ folder_name: folderPath }),
                });
                const data = await res.json();

                if (!data.success) {
                    alert(data.error || 'Failed to open folder');
                    return;
                }

                imageNav.style.display = 'flex';
                await loadCurrentImage();
            } catch (err) {
                alert('Error opening folder: ' + err.message);
            }
        }

        async function loadCurrentImage() {
            try {
                const res = await fetch(`${BACKEND}/images/current`);
                const data = await res.json();

                if (data.error) {
                    imageDisplay.innerHTML = `<div class="image-empty">${data.error}</div>`;
                    return;
                }

                renderImageView(data);
            } catch (err) {
                imageDisplay.innerHTML = `<div class="image-empty">Error: ${err.message}</div>`;
            }
        }

        async function imageNavAction(action) {
            try {
                const res = await fetch(`${BACKEND}/images/${action}`, { method: 'POST' });
                const data = await res.json();

                if (data.error) {
                    // Stay on current image, show brief notification
                    return;
                }

                renderImageView(data);
            } catch (err) {
                console.error('Image nav error:', err);
            }
        }

        function renderImageView(data) {
            const pos = (data.position || 0) + 1;
            const total = data.total || 0;
            imageCounter.textContent = `${pos} / ${total}`;

            let html = '';

            // Image display
            if (data.serve_url) {
                html += `<img src="${BACKEND}${data.serve_url}" alt="${data.filename || 'Image'}" />`;
            }

            html += `<div style="font-size:14px; font-weight:600; color:#e94560; margin-top:4px;">${data.filename || ''}</div>`;

            // Raw perception
            if (data.raw_perception) {
                html += `<div class="image-perception">
                    <h4>Raw Impression</h4>
                    <p>${escHtml(data.raw_perception)}</p>
                </div>`;
            }

            // Identified elements
            if (data.identified_elements) {
                html += `<div class="image-perception">
                    <h4>Identity &amp; Context</h4>
                    <p>${escHtml(data.identified_elements)}</p>
                </div>`;
            }

            // Pattern resonance
            const resonances = data.pattern_resonance || [];
            if (resonances.length > 0) {
                html += `<div class="image-perception">
                    <h4>Pattern Resonance</h4>
                    ${resonances.map(r => `<p class="resonance">${escHtml(r)}</p>`).join('')}
                </div>`;
            }

            // EXIF
            const exif = data.exif_data || {};
            const exifParts = [];
            if (exif.original_timestamp) exifParts.push(`Taken: ${exif.original_timestamp}`);
            if (exif.camera_model) exifParts.push(`Camera: ${exif.camera_make || ''} ${exif.camera_model}`.trim());
            if (exif.iso) exifParts.push(`ISO ${exif.iso}`);
            if (exifParts.length > 0) {
                html += `<div class="image-perception">
                    <h4>EXIF</h4>
                    <p class="exif">${exifParts.join(' &middot; ')}</p>
                </div>`;
            }

            // Next preview
            if (data.next_preview) {
                html += `<div class="image-perception" style="border-left: 3px solid #0f3460; padding-left: 12px;">
                    <h4>Next Image</h4>
                    <p style="color:#a0a0b0; font-style:italic;">${escHtml(data.next_preview)}</p>
                </div>`;
            }

            // Synthesis notes
            if (data.synthesis_notes) {
                html += `<div class="image-perception">
                    <h4>Aeynis's Notes</h4>
                    <p>${escHtml(data.synthesis_notes)}</p>
                </div>`;
            }

            imageDisplay.innerHTML = html;
        }

        function escHtml(str) {
            return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
    </script>
</body>
</html>
