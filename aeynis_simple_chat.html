<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeynis Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 1000px;
            height: 95vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .status {
            padding: 12px 20px;
            background: #d4edda;
            border-bottom: 1px solid #c3e6cb;
            font-size: 13px;
            color: #155724;
            font-weight: 500;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border-bottom-color: #f5c6cb;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-label {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message-content {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #dee2e6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 2px solid #dee2e6;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .controls button {
            flex: 1;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #saveConvo {
            background: #17a2b8;
            color: white;
        }

        #saveConvo:hover {
            background: #138496;
            transform: translateY(-1px);
        }

        #clearChat {
            background: #dc3545;
            color: white;
        }

        #clearChat:hover {
            background: #c82333;
            transform: translateY(-1px);
        }

        .input-container {
            display: flex;
            gap: 12px;
        }

        #messageInput {
            flex: 1;
            padding: 14px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            min-height: 60px;
            transition: border-color 0.2s;
        }

        #messageInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #sendBtn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 100px;
        }

        #sendBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        #sendBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .thinking {
            font-style: italic;
            color: #6c757d;
            padding: 14px 18px;
        }

        .config-info {
            font-size: 12px;
            color: #6c757d;
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            text-align: center;
        }

        .chat-area::-webkit-scrollbar {
            width: 8px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .chat-area::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Library Panel */
        .library-panel {
            display: none;
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 360px;
            background: white;
            border-left: 2px solid #dee2e6;
            box-shadow: -4px 0 20px rgba(0,0,0,0.1);
            z-index: 100;
            flex-direction: column;
            overflow: hidden;
        }

        .library-panel.open {
            display: flex;
        }

        .library-header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .library-header h2 {
            font-size: 18px;
            margin: 0;
        }

        .library-close {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            padding: 0 4px;
        }

        .library-usage {
            padding: 10px 16px;
            background: #e8f5e9;
            font-size: 12px;
            color: #2e7d32;
            border-bottom: 1px solid #c8e6c9;
        }

        .library-usage .usage-bar {
            height: 6px;
            background: #c8e6c9;
            border-radius: 3px;
            margin-top: 6px;
            overflow: hidden;
        }

        .library-usage .usage-fill {
            height: 100%;
            background: #43a047;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .library-tabs {
            display: flex;
            border-bottom: 1px solid #dee2e6;
        }

        .library-tabs button {
            flex: 1;
            padding: 10px;
            border: none;
            background: #f8f9fa;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: #6c757d;
            transition: all 0.2s;
        }

        .library-tabs button.active {
            background: white;
            color: #11998e;
            border-bottom: 2px solid #11998e;
        }

        .library-filelist {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .library-file {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin: 4px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 13px;
            gap: 10px;
        }

        .library-file:hover {
            background: #f0f9f4;
        }

        .library-file .file-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .library-file .file-details {
            flex: 1;
            min-width: 0;
        }

        .library-file .file-name {
            font-weight: 600;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .library-file .file-meta {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }

        .library-empty {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 14px;
        }

        .container {
            position: relative;
        }

        #libraryBtn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        #libraryBtn:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(17, 153, 142, 0.3);
        }

        /* File link in chat messages */
        .file-link {
            display: inline-block;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 13px;
            margin: 4px 2px;
            transition: opacity 0.2s;
        }

        .file-link:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌊 Aeynis</h1>
            <p>Bridge Chat • Backend localhost:5555</p>
        </div>

        <div id="status" class="status">
            ✓ Ready
        </div>

        <div class="chat-area" id="chatArea"></div>

        <!-- Library Side Panel -->
        <div class="library-panel" id="libraryPanel">
            <div class="library-header">
                <h2>Aeynis Library</h2>
                <button class="library-close" id="libraryClose">&times;</button>
            </div>
            <div class="library-usage" id="libraryUsage">Loading...</div>
            <div class="library-tabs">
                <button class="active" data-subdir="">All</button>
                <button data-subdir="originals">Originals</button>
                <button data-subdir="reviews">Reviews</button>
                <button data-subdir="imports">Imports</button>
            </div>
            <div class="library-filelist" id="libraryFileList">
                <div class="library-empty">Loading files...</div>
            </div>
        </div>

        <div class="input-area">
            <div class="controls">
                <button id="libraryBtn">📚 Library</button>
                <button id="saveConvo">💾 Save Conversation</button>
                <button id="clearChat">🗑️ Clear Chat</button>
            </div>
            <div class="input-container">
                <textarea 
                    id="messageInput" 
                    placeholder="Type your message... (Enter to send, Shift+Enter for new line)"
                    autofocus
                ></textarea>
                <button id="sendBtn">Send</button>
            </div>
            <div class="config-info">
                Bridge Backend @ localhost:5555 • Basins + Memory + KoboldCpp + Library
            </div>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        let isProcessing = false;

        const statusDiv = document.getElementById('status');
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const saveConvoBtn = document.getElementById('saveConvo');
        const clearChatBtn = document.getElementById('clearChat');

        function setStatus(message, isError = false) {
            statusDiv.textContent = message;
            statusDiv.className = 'status' + (isError ? ' error' : '');
        }

        function addMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = role === 'user' ? 'You' : 'Aeynis';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            msgDiv.appendChild(label);
            msgDiv.appendChild(contentDiv);
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showThinking() {
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message assistant';
            thinkingDiv.id = 'thinking';

            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = 'Aeynis';

            const content = document.createElement('div');
            content.className = 'thinking';
            content.textContent = 'Thinking...';

            thinkingDiv.appendChild(label);
            thinkingDiv.appendChild(content);
            chatArea.appendChild(thinkingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeThinking() {
            const thinking = document.getElementById('thinking');
            if (thinking) thinking.remove();
        }

        function buildPrompt(userMessage) {
            let prompt = '';
            
            // Add conversation history
            conversationHistory.forEach(msg => {
                if (msg.role === 'user') {
                    prompt += `User: ${msg.content}\n`;
                } else {
                    prompt += `Assistant: ${msg.content}\n`;
                }
            });

            // Add current message
            prompt += `User: ${userMessage}\nAssistant:`;
            return prompt;
        }

        async function sendToBackend(userMessage) {
            const response = await fetch('http://localhost:5555/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: userMessage })
            });

            if (!response.ok) {
                throw new Error(`Backend returned status ${response.status}`);
            }

            const data = await response.json();
            return data.response;
        }

        async function handleSend() {
            const message = messageInput.value.trim();
            if (!message || isProcessing) return;

            isProcessing = true;
            sendBtn.disabled = true;
            messageInput.disabled = true;

            addMessage('user', message);
            conversationHistory.push({ role: 'user', content: message });
            messageInput.value = '';

            showThinking();
            setStatus('Thinking...');

            try {
                const response = await sendToBackend(message);
                removeThinking();
                addMessage('assistant', response);
                conversationHistory.push({ role: 'assistant', content: response });
                setStatus('✓ Ready');
            } catch (error) {
                removeThinking();
                const errorMsg = `[Error: ${error.message}. Is the backend running on port 5555?]`;
                addMessage('assistant', errorMsg);
                setStatus('❌ Error: ' + error.message, true);
            }

            isProcessing = false;
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }

        sendBtn.addEventListener('click', handleSend);
        
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        saveConvoBtn.addEventListener('click', () => {
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            const content = conversationHistory.map(msg => 
                `${msg.role.toUpperCase()}: ${msg.content}\n`
            ).join('\n');

            const fullContent = `AEYNIS CONVERSATION\nTimestamp: ${new Date().toISOString()}\n\n${content}`;

            const blob = new Blob([fullContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `aeynis_${timestamp}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            
            setStatus('✓ Conversation saved');
            setTimeout(() => setStatus('✓ Ready'), 2000);
        });

        clearChatBtn.addEventListener('click', () => {
            if (confirm('Clear conversation history?')) {
                conversationHistory = [];
                chatArea.innerHTML = '';
                setStatus('✓ Chat cleared');
                setTimeout(() => setStatus('✓ Ready'), 2000);
            }
        });

        messageInput.focus();

        // ---------------------------------------------------------------
        // Library Panel
        // ---------------------------------------------------------------
        const BACKEND = 'http://localhost:5555';
        const libraryPanel = document.getElementById('libraryPanel');
        const libraryBtn = document.getElementById('libraryBtn');
        const libraryClose = document.getElementById('libraryClose');
        const libraryFileList = document.getElementById('libraryFileList');
        const libraryUsage = document.getElementById('libraryUsage');
        let currentLibrarySubdir = '';

        libraryBtn.addEventListener('click', () => {
            libraryPanel.classList.toggle('open');
            if (libraryPanel.classList.contains('open')) {
                loadLibraryFiles(currentLibrarySubdir);
            }
        });

        libraryClose.addEventListener('click', () => {
            libraryPanel.classList.remove('open');
        });

        // Tab switching
        document.querySelectorAll('.library-tabs button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.library-tabs button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLibrarySubdir = btn.dataset.subdir;
                loadLibraryFiles(currentLibrarySubdir);
            });
        });

        async function loadLibraryFiles(subdir) {
            try {
                const res = await fetch(`${BACKEND}/library/files?subdir=${encodeURIComponent(subdir)}`);
                const data = await res.json();

                // Update usage bar
                const u = data.usage;
                libraryUsage.innerHTML = `
                    ${u.used_human} / ${u.limit_human} used (${u.percent_used}%)
                    <div class="usage-bar"><div class="usage-fill" style="width:${Math.min(u.percent_used, 100)}%"></div></div>
                `;

                // Render file list
                if (data.files.length === 0) {
                    libraryFileList.innerHTML = '<div class="library-empty">No files yet. Aeynis can write documents here.</div>';
                    return;
                }

                libraryFileList.innerHTML = data.files.map(f => {
                    const icon = fileIcon(f.type, f.name);
                    if (f.type === 'directory') {
                        return `<div class="library-file" onclick="loadLibraryFiles('${f.path.replace(/\/$/, '')}')">
                            <span class="file-icon">${icon}</span>
                            <div class="file-details">
                                <div class="file-name">${f.name}</div>
                                <div class="file-meta">Directory</div>
                            </div>
                        </div>`;
                    }
                    const viewUrl = `${BACKEND}/library/serve/${encodeURIComponent(f.path)}`;
                    return `<div class="library-file" onclick="window.open('${viewUrl}', '_blank')">
                        <span class="file-icon">${icon}</span>
                        <div class="file-details">
                            <div class="file-name">${f.name}</div>
                            <div class="file-meta">${f.size_human} &middot; ${new Date(f.modified).toLocaleDateString()}</div>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) {
                libraryFileList.innerHTML = `<div class="library-empty">Error loading library: ${err.message}</div>`;
            }
        }

        function fileIcon(mimeType, name) {
            if (name && name.endsWith('/')) return '📁';
            if (!mimeType) return '📄';
            if (mimeType.includes('pdf')) return '📕';
            if (mimeType.includes('html')) return '🌐';
            if (mimeType.includes('markdown') || (name && name.endsWith('.md'))) return '📝';
            if (mimeType.includes('text')) return '📄';
            if (mimeType.includes('opendocument')) return '📘';
            return '📎';
        }

        // Parse file links in assistant messages: [file:path/to/file.md]
        function renderFileLinks(text) {
            return text.replace(/\[file:([^\]]+)\]/g, (match, path) => {
                const url = `${BACKEND}/library/serve/${encodeURIComponent(path.trim())}`;
                const name = path.split('/').pop();
                return `<a href="${url}" target="_blank" class="file-link">📄 ${name}</a>`;
            });
        }

        // Override addMessage to support file links
        const _origAddMessage = addMessage;
        addMessage = function(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = role === 'user' ? 'You' : 'Aeynis';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (role === 'assistant') {
                // Render file links as clickable elements
                contentDiv.innerHTML = renderFileLinks(
                    content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                );
            } else {
                contentDiv.textContent = content;
            }

            msgDiv.appendChild(label);
            msgDiv.appendChild(contentDiv);
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        };
    </script>
</body>
</html>
